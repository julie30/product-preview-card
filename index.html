<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Product preview card component</title>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main>
    <article>
      <picture>
        <source srcset="images/image-product-desktop.jpg" media="(min-width: 48em)">
        <img class="image" src="images/image-product-mobile.jpg" alt="Chanel parfum." width="350" height="342" loading="eager" decoding="async">
      </picture>
      <div class="info">
        <p class="perfume">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <div class="price-row">
          <p class="discount">&dollar;149.99</p>
          <p class="price">&dollar;169.99</p>
        </div>
        <button><img src="images/icon-cart.svg" alt="Basket icon">Add to Cart</button>
      </div>
      
    </article>

  </main>

</body>
</html>
